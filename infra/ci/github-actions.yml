name: EcoNav CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/backend.txt -r requirements/frontend.txt -r requirements/ml.txt
          pip install pytest ruff

      - name: Seed demo data
        run: python scripts/seed_data.py

      - name: Lint
        run: ruff check apps models scripts tests

      - name: Run tests
        run: pytest

      - name: Smoke test workflow
        run: python scripts/test_pipeline.py

  deploy-hf:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-and-lint, docker-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://hitendras510:$HF_TOKEN@huggingface.co/spaces/hitendras510/EcoNav-AI
          git push --force hf main
